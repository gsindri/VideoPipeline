shadow_mode: true
sources:
  # Twitch Helix-backed source discovery.
  # Requires TWITCH_CLIENT_ID plus TWITCH_CLIENT_SECRET or TWITCH_APP_ACCESS_TOKEN.
  - id: streamer-twitch
    label: Streamer Twitch VODs
    provider: twitch_helix
    platform: twitch
    channel_login: streamer_name
    url: https://www.twitch.tv/streamer_name/videos
    enabled: true
    priority: 4
    recent_hours: 72
    max_candidates: 4
    min_duration_s: 1800
    max_duration_s: 21600
    title_include_any:
      - challenge
      - ranked
      - tournament
      - insane
    title_exclude_any:
      - rerun
      - test
      - archive
    tags:
      - gaming
      - twitch

  # Generic watchlist source via yt-dlp flat extraction.
  - id: streamer-youtube
    label: Streamer YouTube uploads
    url: https://www.youtube.com/@streamer/videos
    platform: youtube
    enabled: true
    priority: 3
    recent_hours: 168
    max_candidates: 4
    min_duration_s: 480
    max_duration_s: 14400
    title_include_any:
      - highlights
      - challenge
      - reaction
      - clutch
    title_exclude_any:
      - shorts
      - stream archive
    tags:
      - gaming
